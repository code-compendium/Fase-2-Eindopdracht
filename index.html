<!doctype html>
<html lang="nl">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Todo App</title>
		<link rel="stylesheet" href="todo.css" />
	</head>
	<body>
		<div class="page">
			<header class="app-header">
				<h1 class="app-title">Mijn Taken</h1>
				<!-- aria-live: schermlezers kondigen wijzigingen automatisch aan -->
				<p class="app-teller" aria-live="polite" aria-atomic="true">
					<!-- Gevuld door JavaScript -->
				</p>
			</header>

			<main class="app-main">
				<!-- Invoerformulier -->
				<section class="invoer-sectie" aria-label="Nieuwe taak toevoegen">
					<form class="invoer-form" id="invoer-form">
						<label for="taak-invoer" class="sr-only">Nieuwe taak</label>
						<input
							type="text"
							id="taak-invoer"
							class="invoer-veld"
							placeholder="Voeg een taak toe..."
							autocomplete="off"
							maxlength="200"
							required
						/>
						<button type="submit" class="btn btn--primary">Toevoegen</button>
					</form>
				</section>

				<!-- Filterbalk -->
				<section class="filter-sectie" aria-label="Taken filteren">
					<div class="filter-bar" role="group" aria-label="Filter opties">
						<button class="filter-btn filter-btn--active" data-filter="all">
							Alle taken
						</button>
						<button class="filter-btn" data-filter="open">Open</button>
						<button class="filter-btn" data-filter="afgerond">Afgerond</button>
					</div>
					<button class="btn btn--ghost btn--sm" id="wis-afgerond-btn">
						Wis afgerond
					</button>
				</section>

				<!-- Takenlijst -->
				<section class="taken-sectie" aria-label="Takenlijst">
					<ul class="taken-lijst" id="taken-lijst" aria-label="Taken">
						<!-- Gevuld door JavaScript -->
					</ul>

					<!-- Lege staat -->
					<div class="lege-staat" id="lege-staat" hidden>
						<p class="lege-staat__tekst" id="lege-staat__tekst">
							<!-- Tekst afhankelijk van actief filter -->
						</p>
					</div>
				</section>
			</main>
		</div>

		<script src="todo.js" defer></script>
	</body>
</html>
